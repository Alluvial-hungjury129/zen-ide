name: Release

on:
  workflow_dispatch:
    inputs:
      notes_b64:
        description: "Base64-encoded release notes (injected by make release)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "::error::Tag ${TAG} already exists — bump version in pyproject.toml first"
            exit 1
          fi

      - name: Decode release notes
        run: echo "${{ inputs.notes_b64 }}" | base64 -d > /tmp/release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Zen IDE ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md \
            --target main

  build-linux:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Install system dependencies
        run: make install-system-deps

      - name: Install Python dependencies
        run: |
          make install-py
          make install-build

      - name: Build AppImage
        run: bash tools/build_appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/Zen_IDE-*.AppImage

  build-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Install system dependencies
        run: make install-system-deps

      - name: Install Python dependencies
        run: |
          make install-py
          make install-build

      - name: Build macOS app
        run: |
          make build-launcher
          uv run pyinstaller "Zen IDE.spec" --noconfirm

      - name: Strip and sign
        run: |
          APP_BUNDLE="dist/Zen IDE.app"
          find "$APP_BUNDLE/Contents/Frameworks" -type f \( -name '*.dylib' -o -name '*.so' \) \
            -exec strip -x {} 2>/dev/null \;
          find "$APP_BUNDLE/Contents/Resources" -type f -name '*.so' \
            -exec strip -x {} 2>/dev/null \;
          strip -x "$APP_BUNDLE/Contents/Frameworks/Python.framework/Versions/3.14/Python" 2>/dev/null || true
          .venv/bin/python3 tools/trim_icu_data.py "$APP_BUNDLE"
          find "$APP_BUNDLE" -name '*.dylib' -o -name '*.so' -o -name 'Python' | \
            xargs -I{} codesign --force --sign - {} 2>/dev/null || true
          codesign --force --deep --sign - --entitlements entitlements.plist "$APP_BUNDLE"

      - name: Create tar.gz
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          cd dist
          tar -czf "Zen_IDE-${VERSION}-macos.tar.gz" "Zen IDE.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/Zen_IDE-*-macos.tar.gz

  upload:
    needs: [release, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag }}" \
            artifacts/linux-appimage/* \
            artifacts/macos-app/*
