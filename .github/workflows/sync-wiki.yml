name: Sync docs/wiki to GitHub Wiki

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Sync to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the wiki repo
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          WIKI_DIR=$(mktemp -d)
          git clone "$WIKI_URL" "$WIKI_DIR"

          # Remove old wiki content and copy new content
          rm -rf "$WIKI_DIR"/*.md
          cp docs/wiki/*.md "$WIKI_DIR/"

          # Commit and push if there are changes
          cd "$WIKI_DIR"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync wiki from docs/wiki (${GITHUB_SHA::7})"
            git push
            echo "Wiki updated successfully!"
          fi
